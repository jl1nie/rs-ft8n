language = "C"
include_guard = "WSJT_FFI_H"
pragma_once = true
cpp_compat = true
tab_width = 4
documentation_style = "doxy"
autogen_warning = "/* Generated by cbindgen — do not edit. */"

[export]
prefix = ""

[export.rename]
# no renames — we already use the Wsjt* prefix on our public items

[fn]
args = "vertical"

[enum]
rename_variants = "QualifiedScreamingSnakeCase"

[parse]
parse_deps = false
